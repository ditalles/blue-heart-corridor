name: Keep Supabase Alive

# Pings Supabase daily to prevent the free-tier project from being paused
# after 7 days of inactivity. Runs in GitHub's cloud — works even when
# the local machine is offline.

on:
  schedule:
    # Runs every day at 09:23 UTC (avoid common :00/:30 marks)
    - cron: '23 9 * * *'
  workflow_dispatch: # Allow manual trigger from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/hostels?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Supabase responded with HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Supabase returned non-200 status. Project may be paused."
            exit 1
          fi

      - name: Ping Vercel deployment
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://claudehostelmarketplace.vercel.app")
          echo "Vercel responded with HTTP $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "307" ]; then
            echo "::warning::Vercel returned $STATUS — check deployment"
          fi

      - name: Summary
        run: echo "✓ Keep-alive ping complete at $(date -u)"
